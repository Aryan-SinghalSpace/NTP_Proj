# Local development infrastructure for the Traceability Platform.
# Postgres (system of record + Temporal persistence), Redis (cache/pubsub),
# Temporal (workflow engine) + Temporal UI, MinIO (S3-compatible object store).
#
#   pnpm infra:up      # start
#   pnpm infra:down    # stop
#
# Requires Docker. Values come from infra/.env (copy from infra/.env.example).

name: tracewell-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tracewell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracewell}
      POSTGRES_DB: ${POSTGRES_DB:-tracewell}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracewell}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-tracewell}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-tracewell}
      - POSTGRES_SEEDS=postgres
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"

  temporal-ui:
    image: temporalio/ui:2.31.2
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tracewell}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tracewell123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
